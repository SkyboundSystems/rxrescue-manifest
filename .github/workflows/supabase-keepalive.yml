name: Supabase keepalive (RxRescue)

# Hits the RxRescue Supabase project's /healthz Edge Function once a day
# to prevent Free-tier auto-pause (kicks in after 7 days with no activity).
# Lives in this PUBLIC repo because public-repo Actions get unlimited
# minutes — avoids burning the private rxrescue repo's 2000-min/month
# budget on a trivial keepalive curl.
#
# Redundancy: a SECOND keepalive is scheduled INSIDE the database via
# pg_cron (job: rxrescue_internal_heartbeat, daily 12:00 UTC). Either
# job alone keeps the project alive; both together = the project doesn't
# pause if either side fails. We deliberately schedule this job at 00:00
# UTC so the two heartbeats are ~12 hours apart.
#
# /healthz is a public Edge Function (verify_jwt=false). No auth header
# needed. Hitting the function runtime resets the function-side pause
# clock; the function's pure-CPU response (no DB query) is fine because
# the pg_cron heartbeat covers the database side.
#
# How to verify:
#   GitHub → Actions tab → "Supabase keepalive (RxRescue)" → Run workflow.
#   Successful run shows "Status: 200 | Time: <x>s | Keepalive ping successful."

on:
  schedule:
    - cron: '0 0 * * *'     # daily at 00:00 UTC (~6 PM Mountain in DST)
  workflow_dispatch:        # manual trigger from the Actions tab for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit Supabase /healthz Edge Function
        env:
          HEALTHZ_URL: https://vomeodetmwylawmudsfj.supabase.co/functions/v1/healthz
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS \
            "$HEALTHZ_URL" \
            -w "\nStatus: %{http_code} | Time: %{time_total}s\n")
          echo "$RESPONSE"
          echo "Keepalive ping successful."
